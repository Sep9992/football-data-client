name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Keep DB alive
        env:
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install psycopg2-binary
          python -c "import psycopg2, os; psycopg2.connect(os.environ['DB_URL']).close(); print('✅ DB alive')"
