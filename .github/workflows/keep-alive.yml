name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Keep database alive
        env:
          DB_URL: ${{ secrets.postgresql://postgres:Konikova1112@db.wzficawmmbqaftsosznm.supabase.co:5432/postgres }}
        run: |
          pip install psycopg2-binary
          python << 'EOF'
          import psycopg2
          import os
          psycopg2.connect(os.environ['DB_URL']).close()
          print('✅ DB alive')
          EOF